<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container">

        <form action="">
            <h1 class="item">Register</h1>
            <div class="item">

                <label for="username">
                    Username:
                </label>
                <input type="text" placeholder="Enter Username"><br>
            </div>
            <div class="item">

                <label for="passowrd">
                    Password:
                </label>
                <input type="password" placeholder="Enter Password"><br>
            </div>
            <div class="item">

                <label for="Gender">
                    Gender: 
                </label> Male <input type="radio" value="male" name="gender"> Female <input type="radio" value="female" name="gender"> Other <input type="radio" value="other" name="gender"><br>
            </div>
            <div class="item">

                <label for="Birth-Date">
                    Birth-Date:
                </label>
                <input type="date"> <br>
            </div>
            <div class="item">

                <label for="Phone">
                    Phone Number:
                </label>
                <input type="tel" placeholder="Enter Phone Number"><br>
            </div>
            <input type="submit">
        </form>
    </div>
</body>

</html>
