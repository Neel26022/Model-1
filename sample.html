<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container">

        <form action="">
            <h1 class="item">Register</h1>
            
            <div class="item">

                <label for="username">
                    Username:
                </label>
                <input type="text" placeholder="Enter Username"><br>
            </div>
            <div class="item">

                <label for="passowrd">
                    Password:
                </label>
                <input type="password" placeholder="Enter Password"><br>
            </div>
            <div class="item">

                <label for="Gender">
                    Gender: 
                </label> Male <input type="radio" value="male" name="gender"> Female <input type="radio" value="female" name="gender"> Other <input type="radio" value="other" name="gender"><br>
            </div>
            <div class="item">

                <label for="Birth-Date">
                    Birth-Date:
                </label>
                <input type="date"> <br>
            </div>
            <div class="item">

                <label for="Phone">
                    Phone Number:
                </label>
                <input type="tel" placeholder="Enter Phone Number"><br>
            </div>
            <div class="item">
                <label for="Choice">
                    Choice: 
                </label>
                <input type="checkbox" value="bmw"> BMW
                 <input type="checkbox" value="farrari"> Farrari
                 <input type="checkbox" value="tata"> Tata
            </div>
            <div class="item">
                <label for="Address">
                    Address: 
                </label>
                <textarea name="Address" id="" placeholder="Enter Your address"></textarea>
            </div>
            <div class="item">
                <label for="color">
                    Color: 
                </label>
                <input type="color">
            </div>
            <div class="item">
                <label for="email">
                    Email: 
                </label>
                <input type="email" placeholder="Enter Your Email">
            </div>
            <div class="item">
                <label for="range">
                    Range: 
                </label>
                <input type="range" min="0" max="100" value="50">
            </div>
            <div class="item">
                <label for="file">
                    Upload File: 
                </label>
                <input type="file">
            </div>
            <div class="item">
                <label for="search">
                    Search: 
                </label>
                <input type="search" placeholder="Search anything 😀">
            </div>
            <div class="item">
                <label for="dropdown">
                    Select Stream: 
                </label>
                <select name="" id="">
                    <option value="IT">IT</option>
                    <option value="AIML">AIML</option>
                    <option value="CE">CE</option>
                </select>
            </div>
            <div class="item">
                <div style="width: 100px; height: 50px; display: flex; align-items: center;">
                    <label for="image">
                        Image: 
                    </label>
                    <input type="image" style="height: 100%; width: 100%;" src="https://static.vecteezy.com/system/resources/previews/025/894/618/non_2x/cute-word-hello-cartoon-style-illustration-vector.jpg">
                </div>
            </div>
            <input type="submit" id="submit">
            <input type="reset" id="submit">
        </form>
    </div>
</body>

</html>
